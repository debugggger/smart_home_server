<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Управление устройствами - Умный дом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fb;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #1e2a3a;
            font-size: 28px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .back-btn, .add-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            font-weight: 500;
        }

        .back-btn {
            background: #64748b;
            color: white;
        }

        .add-btn {
            background: #4fc3f7;
            color: #1e2a3a;
            font-weight: bold;
        }

        .back-btn:hover, .add-btn:hover {
            transform: translateY(-2px);
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 24px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px;
        }

        th {
            background: #f8fafc;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
        }

        .delete-btn {
            background: #fee2e2;
            border: none;
            color: #b91c1c;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
        }

        .delete-btn:hover {
            background: #fecaca;
        }

        .device-status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .device-status-indicator.online {
            background-color: #10b981;
        }

        .device-status-indicator.offline {
            background-color: #ef4444;
        }

        .device-row {
            transition: background-color 0.3s;
        }

        .device-row.offline {
            opacity: 0.6;
        }

        .device-row.offline td:first-child::before {
            content: "🔴 ";
            font-size: 12px;
        }

        .status-online {
            color: #10b981;
        }

        .status-offline {
            color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #1e2a3a;
        }

        .modal-content .form-description {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #334155;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.15);
        }

        .field-required {
            color: #ef4444;
            font-weight: 600;
        }

        .field-hint {
            display: block;
            color: #94a3b8;
            font-size: 12px;
            margin-top: 4px;
        }

        .dynamic-field {
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .modal-buttons button:first-child {
            background: #4fc3f7;
            color: white;
        }

        .modal-buttons button:first-child:hover {
            background: #29b6f6;
            transform: translateY(-2px);
        }

        .modal-buttons button:last-child {
            background: #e2e8f0;
            color: #475569;
        }

        .modal-buttons button:last-child:hover {
            background: #cbd5e1;
        }

        .toast-msg {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1e2a3a;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: 0.2s;
        }

        .toast-msg.show {
            opacity: 1;
        }

        .loading-text {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .card {
                padding: 16px;
            }
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
            .header-buttons {
                justify-content: flex-end;
            }
            .modal-content {
                width: 95%;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 id="pageTitle">📟 Устройства контроллера</h1>
            </div>
            <div class="header-buttons">
                <button class="back-btn" onclick="goBack()">← Назад к контроллерам</button>
                <button class="add-btn" onclick="showAddDeviceModal()">+ Добавить устройство</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table id="devicesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя устройства</th>
                            <th>Тип</th>
                            <th>Порт</th>
                            <th>Статус</th>
                            <th>Параметры</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="devicesTableBody">
                        <tr>
                            <td colspan="7" class="loading-text">⏳ Загрузка устройств...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Модальное окно добавления устройства -->
    <div id="addDeviceModal" class="modal">
        <div class="modal-content">
            <h3>➕ Добавить устройство</h3>
            <p class="form-description">Заполните данные для нового устройства на контроллере.</p>

            <div class="form-group">
                <label>Имя устройства <span class="field-required">*</span></label>
                <input type="text" id="deviceName" placeholder="Например: Датчик температуры">
            </div>

            <div class="form-group">
                <label>Тип устройства <span class="field-required">*</span></label>
                <select id="deviceTypeId" onchange="onDeviceTypeChange()">
                    <option value="">Выберите тип</option>
                </select>
            </div>

            <!-- Контейнер для динамических полей (device_params) -->
            <div id="dynamicFieldsContainer"></div>

            <div class="modal-buttons">
                <button onclick="saveDevice()">Сохранить</button>
                <button onclick="closeModal('addDeviceModal')">Отмена</button>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>

    <script>
        // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
        let currentControllerId = null;
        let currentControllerName = '';
        let currentDeviceParams = {}; // Хранит текущие param_names.device_params для выбранного типа
        let devicesData = {};
        let deviceTypesList = []; // Полный список типов устройств

        // ============ ИНИЦИАЛИЗАЦИЯ ============
        currentControllerId = localStorage.getItem('selectedControllerId');
        currentControllerName = localStorage.getItem('selectedControllerName');

        if (currentControllerId) {
            document.getElementById('pageTitle').innerHTML = `📟 Устройства контроллера: ${currentControllerName}`;
            loadDevices();
            loadDeviceTypes();
        } else {
            document.getElementById('devicesTableBody').innerHTML =
                '<tr><td colspan="7" class="empty-state">❌ Контроллер не выбран</td></tr>';
        }

        // ============ ЗАГРУЗКА УСТРОЙСТВ ============
        async function loadDevices() {
            try {
                const response = await fetch(`/api/devices/by-controller/${currentControllerId}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const devices = await response.json();
                const tbody = document.getElementById('devicesTableBody');

                if (!devices || devices.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">📭 Нет устройств. Нажмите "+ Добавить устройство"</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                devices.forEach(device => {
                    const isOnline = device.is_online !== undefined ? device.is_online : true;
                    const row = document.createElement('tr');
                    row.className = `device-row ${isOnline ? '' : 'offline'}`;
                    row.dataset.deviceId = device.id;
                    devicesData[device.id] = device;

                    row.innerHTML = `
                        <td>${device.id}</td>
                        <td>${escapeHtml(device.name)}</td>
                        <td>${escapeHtml(device.type_name || 'Unknown')}</td>
                        <td>${escapeHtml(device.port || '—')}</td>
                        <td class="status-cell">
                            <span class="device-status-indicator ${isOnline ? 'online' : 'offline'}"></span>
                            <span class="status-text ${isOnline ? 'status-online' : 'status-offline'}">
                                ${isOnline ? 'Онлайн' : 'Офлайн'}
                            </span>
                        </td>
                        <td class="params-cell">${escapeHtml(device.params || '{}')}</td>
                        <td>
                            <button class="delete-btn" onclick="deleteDevice(${device.id})">Удалить</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                showToast('❌ Ошибка загрузки устройств');
            }
        }

        // ============ ЗАГРУЗКА ТИПОВ УСТРОЙСТВ ============
        async function loadDeviceTypes() {
            try {
                const response = await fetch('/api/device-types');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                deviceTypesList = await response.json();
                const select = document.getElementById('deviceTypeId');

                select.innerHTML = '<option value="">Выберите тип</option>';
                deviceTypesList.forEach(type => {
                    const displayName = type.param_names?.display_name || type.name;
                    select.innerHTML += `<option value="${type.id}">${displayName}</option>`;
                });
            } catch (error) {
                console.error('Ошибка загрузки типов:', error);
                showToast('❌ Ошибка загрузки типов устройств');
            }
        }

        // ============ ПОИСК ТИПА ПО ID ============
        function findTypeById(typeId) {
            return deviceTypesList.find(t => t.id == typeId);
        }

        // ============ ОБРАБОТЧИК СМЕНЫ ТИПА ============
        function onDeviceTypeChange() {
            const typeId = document.getElementById('deviceTypeId').value;
            const container = document.getElementById('dynamicFieldsContainer');
            container.innerHTML = '';

            if (!typeId) {
                currentDeviceParams = {};
                return;
            }

            const type = findTypeById(typeId);
            if (!type) {
                currentDeviceParams = {};
                return;
            }

            const deviceParams = type.param_names?.device_params || {};
            currentDeviceParams = deviceParams;

            // Создаём поля для каждого параметра
            const paramKeys = Object.keys(deviceParams);
            if (paramKeys.length === 0) {
                // Если нет параметров — показываем сообщение
                const div = document.createElement('div');
                div.className = 'form-group';
                div.innerHTML = `
                    <label>Параметры</label>
                    <input type="text" id="deviceParamsFallback" placeholder='{"extra": "value"}'>
                    <span class="field-hint">Дополнительные параметры в формате JSON</span>
                `;
                container.appendChild(div);
                return;
            }

            paramKeys.forEach(key => {
                const div = document.createElement('div');
                div.className = 'form-group dynamic-field';

                const label = document.createElement('label');
                const displayName = deviceParams[key] || key;
                const isRequired = key === 'port'; // port всегда обязателен
                label.innerHTML = `${displayName} ${isRequired ? '<span class="field-required">*</span>' : ''}`;
                div.appendChild(label);

                const input = document.createElement('input');
                input.type = 'text';
                input.id = `param_${key}`;
                input.className = 'dynamic-input';
                input.dataset.paramKey = key;
                input.dataset.required = isRequired;
                input.placeholder = `Введите ${displayName.toLowerCase()}`;

                // Если это порт — добавляем подсказку
                if (key === 'port') {
                    input.placeholder = 'GPIO2, A0 и т.д.';
                }

                div.appendChild(input);

                // Подсказка
                const hint = document.createElement('span');
                hint.className = 'field-hint';
                hint.textContent = `Параметр "${key}"`;
                div.appendChild(hint);

                container.appendChild(div);
            });
        }

        // ============ СБОР ПАРАМЕТРОВ УСТРОЙСТВА ============
        function collectDeviceParams() {
            const params = {};
            const inputs = document.querySelectorAll('.dynamic-input');
            inputs.forEach(input => {
                const key = input.dataset.paramKey;
                if (key) {
                    params[key] = input.value || '';
                }
            });

            // Если есть fallback поле
            const fallback = document.getElementById('deviceParamsFallback');
            if (fallback && fallback.value) {
                try {
                    const extra = JSON.parse(fallback.value);
                    Object.assign(params, extra);
                } catch {
                    // Игнорируем
                }
            }

            return params;
        }

        // ============ ФОРМИРОВАНИЕ PARAMS ДЛЯ СОХРАНЕНИЯ ============
        function buildDeviceParamsForSave() {
            const collected = collectDeviceParams();
            const port = collected.port || '';

            // Убираем port из параметров, если он есть
            const { port: _, ...restParams } = collected;

            // Если есть только port — сохраняем как пустую строку
            if (Object.keys(restParams).length === 0) {
                return { port: port, params: '' };
            }

            // Объединяем остальные параметры через "/"
            const paramsStr = Object.values(restParams).join('/');

            return {
                port: port,
                params: paramsStr
            };
        }

        // ============ СОХРАНЕНИЕ УСТРОЙСТВА ============
        async function saveDevice() {
            const name = document.getElementById('deviceName').value.trim();
            const typeId = document.getElementById('deviceTypeId').value;

            if (!name) {
                showToast('❌ Введите имя устройства');
                document.getElementById('deviceName').focus();
                return;
            }

            if (!typeId) {
                showToast('❌ Выберите тип устройства');
                document.getElementById('deviceTypeId').focus();
                return;
            }

            // Проверяем обязательные поля
            const requiredInputs = document.querySelectorAll('.dynamic-input[data-required="true"]');
            let hasError = false;
            requiredInputs.forEach(input => {
                if (!input.value || input.value.trim() === '') {
                    const label = input.closest('.form-group')?.querySelector('label');
                    showToast(`❌ Поле "${label?.textContent?.replace('*', '').trim() || 'порт'}" обязательно`);
                    input.focus();
                    input.style.borderColor = '#ef4444';
                    setTimeout(() => { input.style.borderColor = ''; }, 3000);
                    hasError = true;
                }
            });
            if (hasError) return;

            // ============ ПРОВЕРКА ЗАНЯТОСТИ ПОРТОВ ============
            try {
                // 1. Получаем все устройства текущего контроллера
                const response = await fetch(`/api/devices/by-controller/${currentControllerId}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const existingDevices = await response.json();

                // 2. Собираем все порты из существующих устройств
                const usedPorts = [];

                existingDevices.forEach(device => {
                    // Основной порт
                    if (device.port && device.port.trim() !== '') {
                        usedPorts.push(device.port.trim());
                    }

                    // Парсим параметры устройства
                    if (device.params) {
                        try {
                            const params = typeof device.params === 'string'
                                ? JSON.parse(device.params)
                                : device.params;

                            // Ищем все поля, которые могут быть портами (port, port2, port3 и т.д.)
                            for (const [key, value] of Object.entries(params)) {
                                if (key.toLowerCase().includes('port') && value && value.trim() !== '') {
                                    usedPorts.push(value.trim());
                                }
                            }
                        } catch (e) {
                            // Если не JSON, игнорируем
                        }
                    }
                });

                console.log('[Port Check] Used ports:', usedPorts);

                // 3. Собираем выбранные порты из формы
                const selectedPorts = [];

                // Основной порт
                const mainPortInput = document.getElementById('devicePort');
                if (mainPortInput && mainPortInput.value.trim() !== '') {
                    selectedPorts.push(mainPortInput.value.trim());
                }

                // Динамические поля (параметры)
                const dynamicInputs = document.querySelectorAll('.dynamic-input');
                dynamicInputs.forEach(input => {
                    const value = input.value.trim();
                    if (!value) return;

                    const paramKey = input.dataset.paramKey || '';
                    // Проверяем, является ли это портом (port, port2, port3 и т.д.)
                    if (paramKey.toLowerCase().includes('port') ||
                        input.closest('.form-group')?.querySelector('label')?.textContent?.toLowerCase().includes('порт')) {
                        selectedPorts.push(value);
                    }
                });

                // Дополнительно проверяем параметры из поля deviceParams (если оно видимо)
                const paramsInput = document.getElementById('deviceParams');
                if (paramsInput && paramsInput.value.trim() !== '') {
                    try {
                        const extraParams = JSON.parse(paramsInput.value.trim());
                        for (const [key, value] of Object.entries(extraParams)) {
                            if (key.toLowerCase().includes('port') && value && value.trim() !== '') {
                                selectedPorts.push(value.trim());
                            }
                        }
                    } catch (e) {
                        // Если не JSON - игнорируем
                    }
                }

                console.log('[Port Check] Selected ports:', selectedPorts);

                // 4. Проверяем пересечение
                const duplicatePorts = selectedPorts.filter(port => usedPorts.includes(port));

                if (duplicatePorts.length > 0) {
                    const uniqueDuplicates = [...new Set(duplicatePorts)];
                    const portsList = uniqueDuplicates.join(', ');
                    showToast(`❌ Порт(ы) уже заняты: ${portsList}`);

                    // Подсвечиваем конфликтующие поля
                    const allInputs = document.querySelectorAll('input[type="text"], input[type="number"]');
                    allInputs.forEach(input => {
                        const value = input.value.trim();
                        if (value && uniqueDuplicates.includes(value)) {
                            input.style.borderColor = '#ef4444';
                            input.style.boxShadow = '0 0 0 3px rgba(239, 68, 68, 0.15)';
                            setTimeout(() => {
                                input.style.borderColor = '';
                                input.style.boxShadow = '';
                            }, 3000);
                        }
                    });

                    return;
                }

                console.log('[Port Check] ✅ All ports are available');

            } catch (error) {
                console.error('[Port Check] Error checking ports:', error);
                showToast('⚠️ Ошибка проверки портов, продолжаем сохранение...');
            }

            // ============ СОХРАНЕНИЕ ============

            // Собираем параметры
            const collectedParams = collectDeviceParams();
            const port = collectedParams.port || '';

            // Убираем port из параметров
            const { port: _, ...restParams } = collectedParams;

            // Формируем params для сохранения
            let paramsForSave = {};

            // Если есть дополнительные параметры
            if (Object.keys(restParams).length > 0) {
                // Собираем все параметры в объект
                Object.keys(restParams).forEach(key => {
                    const value = restParams[key];
                    if (value) {
                        paramsForSave[key] = value;
                    }
                });
            }

            // Добавляем дополнительные параметры из поля (если оно не скрыто)
            const paramsInput = document.getElementById('deviceParams');
            if (paramsInput && paramsInput.style.display !== 'none' && paramsInput.value.trim()) {
                try {
                    const extra = JSON.parse(paramsInput.value.trim());
                    Object.assign(paramsForSave, extra);
                } catch (e) {
                    // Если не JSON - игнорируем
                }
            }

            const payload = {
                name: name,
                controller_id: parseInt(currentControllerId),
                type_id: parseInt(typeId),
                port: port || '',
                params: JSON.stringify(paramsForSave)
            };

            console.log('[Save] Payload:', payload);

            try {
                const response = await fetch('/api/devices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    closeModal('addDeviceModal');
                    showToast('✅ Устройство добавлено');
                    loadDevices();

                    // Сброс формы
                    document.getElementById('deviceName').value = '';
                    document.getElementById('deviceTypeId').value = '';
                    document.getElementById('dynamicFieldsContainer').innerHTML = '';
                    document.getElementById('devicePort').value = '';
                    document.getElementById('deviceParams').value = '';
                    currentDeviceParams = {};
                } else {
                    const error = await response.json();
                    showToast(`❌ Ошибка: ${error.error || 'Неизвестная ошибка'}`);
                }
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showToast('❌ Ошибка сохранения устройства');
            }
        }

        // Вспомогательная функция для извлечения всех портов из устройства
        function extractAllPortsFromDevice(device) {
            const ports = [];

            // Основной порт
            if (device.port && device.port.trim() !== '') {
                ports.push(device.port.trim());
            }

            // Параметры
            if (device.params) {
                try {
                    const params = typeof device.params === 'string'
                        ? JSON.parse(device.params)
                        : device.params;

                    for (const [key, value] of Object.entries(params)) {
                        // Проверяем поля, содержащие "port"
                        if (key.toLowerCase().includes('port') && value && value.trim() !== '') {
                            ports.push(value.trim());
                        }
                    }
                } catch (e) {
                    // Игнорируем ошибки парсинга
                }
            }

            return ports;
        }

        // Функция для проверки занятости портов
        async function checkPortsAvailability(selectedPorts) {
            try {
                const response = await fetch(`/api/devices/by-controller/${currentControllerId}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const existingDevices = await response.json();

                const usedPorts = [];
                existingDevices.forEach(device => {
                    const ports = extractAllPortsFromDevice(device);
                    usedPorts.push(...ports);
                });

                const duplicatePorts = selectedPorts.filter(port => usedPorts.includes(port));
                return {
                    available: duplicatePorts.length === 0,
                    duplicatePorts: [...new Set(duplicatePorts)],
                    usedPorts: [...new Set(usedPorts)]
                };
            } catch (error) {
                console.error('Error checking ports:', error);
                return { available: true, duplicatePorts: [], usedPorts: [] };
            }
        }

        // ============ УДАЛЕНИЕ УСТРОЙСТВА ============
        async function deleteDevice(deviceId) {
            if (!confirm('Удалить устройство?')) return;
            try {
                const response = await fetch(`/api/devices/${deviceId}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('✅ Устройство удалено');
                    delete devicesData[deviceId];
                    loadDevices();
                } else {
                    showToast('❌ Ошибка удаления');
                }
            } catch (error) {
                console.error('Ошибка удаления:', error);
                showToast('❌ Ошибка удаления');
            }
        }

        // ============ МОДАЛЬНЫЕ ОКНА ============
        function showAddDeviceModal() {
            if (!currentControllerId) {
                showToast('❌ Контроллер не выбран');
                return;
            }
            document.getElementById('addDeviceModal').classList.add('active');
            document.getElementById('dynamicFieldsContainer').innerHTML = '';
            currentDeviceParams = {};
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // ============ НАВИГАЦИЯ ============
        function goBack() {
            window.location.href = '/controllers-page';
        }

        // ============ УВЕДОМЛЕНИЯ ============
        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ============ ВСПОМОГАТЕЛЬНЫЕ ============
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // ============ ГЛОБАЛЬНЫЕ ФУНКЦИИ ДЛЯ HTML ============
        window.showAddDeviceModal = showAddDeviceModal;
        window.closeModal = closeModal;
        window.saveDevice = saveDevice;
        window.deleteDevice = deleteDevice;
        window.goBack = goBack;
        window.onDeviceTypeChange = onDeviceTypeChange;
    </script>
</body>
</html>
