<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Управление сценариями - Умный дом</title>

    <link rel="stylesheet" href="/static/css/notifications.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fb;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #1e2a3a;
            font-size: 28px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: background-color 0.3s;
        }

        .status-dot.online {
            background-color: #10b981;
        }

        .status-dot.offline {
            background-color: #ef4444;
        }

        .status-dot.error {
            background-color: #f59e0b;
        }

        .status-text {
            color: #475569;
            font-weight: 500;
        }

        .back-btn, .add-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .back-btn {
            background: #64748b;
            color: white;
        }

        .add-btn {
            background: #4fc3f7;
            color: #1e2a3a;
            font-weight: bold;
        }

        .back-btn:hover, .add-btn:hover {
            transform: translateY(-2px);
        }

        .mode-switch {
            display: flex;
            gap: 10px;
            background: white;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            font-weight: 500;
        }

        .mode-btn.active {
            background: #4fc3f7;
            color: white;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 24px;
            margin-bottom: 30px;
        }

        .card h2 {
            margin-bottom: 20px;
            color: #1e2a3a;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
        }

        .condition-block,
        .action-block {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: 600;
            color: #1e2a3a;
        }

        .remove-btn {
            background: #fee2e2;
            border: none;
            color: #b91c1c;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .add-condition-btn {
            background: #e2e8f0;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .value-field {
            margin-top: 10px;
            display: none;
        }

        .value-field.show {
            display: block;
        }

        /* Динамические поля для параметров команд */
        .param-field {
            margin-top: 10px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 8px;
            display: none;
        }

        .param-field.show {
            display: block;
        }

        .param-field label {
            display: block;
            margin-bottom: 6px;
            color: #334155;
            font-weight: 500;
            font-size: 13px;
        }

        .param-field input,
        .param-field select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
        }

        .param-field input[type="color"] {
            height: 40px;
            padding: 2px;
        }

        .triggers-list table {
            width: 100%;
            border-collapse: collapse;
        }

        .triggers-list th,
        .triggers-list td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .triggers-list th {
            background: #f8fafc;
            font-weight: 600;
        }

        .sub-table {
            width: 100%;
            margin-top: 10px;
            background: #f1f5f9;
            border-radius: 8px;
        }

        .sub-table td {
            padding: 8px;
            font-size: 13px;
        }

        .delete-trigger-btn {
            background: #fee2e2;
            border: none;
            color: #b91c1c;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .edit-trigger-btn {
            background: #e2e8f0;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 5px;
        }

        .toast-msg {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1e2a3a;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: 0.2s;
        }

        .toast-msg.show {
            opacity: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .server-badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Управление сценариями</h1>
            <div class="header-buttons">
                <div class="connection-status">
                    <span class="status-dot offline" id="statusDot"></span>
                    <span class="status-text" id="statusText">Отключено</span>
                </div>
                <button class="back-btn" onclick="window.location.href='/'">← На главную</button>
                <button class="add-btn" onclick="showCreateModal()">+ Создать сценарий</button>
            </div>
        </div>

        <div class="mode-switch">
            <button class="mode-btn active" onclick="switchMode('controller')">Сценарии для контроллеров</button>
            <button class="mode-btn" onclick="switchMode('management')">Сценарии управления</button>
        </div>

        <div class="card">
            <h2>📋 Список сценариев</h2>
            <div class="triggers-list">
                <table id="triggersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Контроллер-источник</th>
                            <th>Контроллер-приемник</th>
                            <th>Условия</th>
                            <th>Действия</th>
                            <th>Управление</th>
                        </tr>
                    </thead>
                    <tbody id="triggersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="triggerModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ Создать сценарий</h3>

            <div class="form-group">
                <label>Название сценария</label>
                <input type="text" id="triggerName" placeholder="Например: Включить свет при движении">
            </div>

            <div class="form-group">
                <label>Контроллер-источник (откуда идет сигнал)</label>
                <select id="srcController" onchange="onSrcControllerChange()"></select>
            </div>

            <div class="form-group">
                <label>Контроллер-приемник (куда отправлять команду)</label>
                <select id="dstController" onchange="onDstControllerChange()">
                    <option value="">Выберите контроллер</option>
                </select>
            </div>

            <h4>📊 Условия (что должно произойти)</h4>
            <div id="conditionsContainer"></div>
            <button class="add-condition-btn" onclick="addCondition()">+ Добавить условие</button>

            <h4 style="margin-top: 20px;">⚡ Действие (что нужно сделать)</h4>
            <div id="actionsContainer"></div>
            <button class="add-condition-btn" onclick="addAction()">+ Добавить действие</button>

            <div class="modal-buttons" style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="add-btn" onclick="saveTrigger()" style="background: #10b981; color: white;">Сохранить</button>
                <button class="back-btn" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script src="/static/js/notifications.js"></script>

    <script>
        let currentEditId = null;
        let controllersList = [];
        let devicesCache = {};
        let commandsCache = {};
        let deviceTypesList = [];
        const SERVER_ID = -1;
        const SERVER_NAME = 'Сервер';
        const SERVER_MAC = 'serv';

        // ============ ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ============

        function switchMode(mode) {
            if (mode === 'controller') {
                document.querySelectorAll('.mode-btn')[0].classList.add('active');
                document.querySelectorAll('.mode-btn')[1].classList.remove('active');
                loadTriggers();
            } else {
                document.querySelectorAll('.mode-btn')[1].classList.add('active');
                document.querySelectorAll('.mode-btn')[0].classList.remove('active');
                if (window.notificationManager) {
                    window.notificationManager.showToast({
                        type: 'warning',
                        message: '⚠️ Режим "Сценарии управления" в разработке'
                    });
                } else {
                    showToast('⚠️ Режим "Сценарии управления" в разработке');
                }
            }
        }

        // ============ ЗАГРУЗКА ТИПОВ УСТРОЙСТВ ============

        async function loadDeviceTypes() {
            try {
                const response = await fetch('/api/device-types');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                deviceTypesList = await response.json();
                console.log('[Triggers] Device types loaded:', deviceTypesList.length);
            } catch (error) {
                console.error('Error loading device types:', error);
            }
        }

        // ============ ПОИСК ТИПА ПО ID ============

        function findTypeById(typeId) {
            return deviceTypesList.find(t => t.id == typeId);
        }

        // ============ ПОЛУЧЕНИЕ DISPLAY_NAME ТИПА ============

        function getTypeDisplayName(typeId) {
            const type = findTypeById(typeId);
            if (type && type.param_names && type.param_names.display_name) {
                return type.param_names.display_name;
            }
            return type?.name || 'Unknown';
        }

        // ============ ЗАГРУЗКА КОНТРОЛЛЕРОВ (С СЕРВЕРОМ) ============

        async function loadControllers() {
            try {
                const response = await fetch('/api/controllers');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const controllers = await response.json();
                controllersList = controllers;
                console.log('[Triggers] Controllers loaded:', controllersList.length);

                const srcSelect = document.getElementById('srcController');
                const dstSelect = document.getElementById('dstController');

                srcSelect.innerHTML = '<option value="">Выберите контроллер</option>';
                dstSelect.innerHTML = '<option value="">Выберите контроллер</option>';

                // Добавляем "Сервер" в список приемников
                const serverOption = document.createElement('option');
                serverOption.value = SERVER_ID;
                serverOption.textContent = `${SERVER_NAME} 🖥️`;
                serverOption.dataset.isServer = 'true';
                dstSelect.appendChild(serverOption);

                controllersList.forEach(ctrl => {
                    const optionSrc = document.createElement('option');
                    optionSrc.value = ctrl.id;
                    optionSrc.textContent = `${ctrl.name} (${ctrl.room_name})`;
                    srcSelect.appendChild(optionSrc);

                    const optionDst = document.createElement('option');
                    optionDst.value = ctrl.id;
                    optionDst.textContent = `${ctrl.name} (${ctrl.room_name})`;
                    dstSelect.appendChild(optionDst);
                });
            } catch (error) {
                console.error('Error loading controllers:', error);
                if (window.notificationManager) {
                    window.notificationManager.showToast({
                        type: 'error',
                        message: '❌ Ошибка загрузки контроллеров'
                    });
                } else {
                    showToast('❌ Ошибка загрузки контроллеров');
                }
            }
        }

        // ============ ЗАГРУЗКА УСТРОЙСТВ КОНТРОЛЛЕРА ============

        async function loadDevicesForController(controllerId) {
            if (!controllerId || controllerId === '') return [];

            // Если выбран Сервер - возвращаем виртуальное устройство
            if (parseInt(controllerId) === SERVER_ID) {
                return [{
                    id: -1,
                    name: 'Числовое значение',
                    type_id: -1,
                    type_name: 'server_value',
                    port: 'value',
                    params: '{}'
                }];
            }

            if (devicesCache[controllerId]) {
                return devicesCache[controllerId];
            }

            try {
                const response = await fetch(`/api/devices/by-controller/${controllerId}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const devices = await response.json();
                devicesCache[controllerId] = devices;
                console.log(`[Triggers] Devices loaded for controller ${controllerId}:`, devices.length);
                return devices;
            } catch (error) {
                console.error('Error loading devices:', error);
                return [];
            }
        }

        // ============ ЗАПОЛНЕНИЕ СПИСКА УСТРОЙСТВ ============

        async function populateDeviceSelect(selectElement, controllerId, selectedDeviceId = null) {
            if (!controllerId || controllerId === '') {
                selectElement.innerHTML = '<option value="">Сначала выберите контроллер</option>';
                return;
            }

            const devices = await loadDevicesForController(controllerId);
            selectElement.innerHTML = '<option value="">Выберите устройство</option>';

            const isServer = parseInt(controllerId) === SERVER_ID;

            devices.forEach(device => {
                const option = document.createElement('option');
                option.value = device.id;

                if (isServer) {
                    option.textContent = `${device.name} (числовое значение)`;
                } else {
                    const typeDisplayName = getTypeDisplayName(device.type_id);
                    option.textContent = `${device.name} (${typeDisplayName}, порт: ${device.port || '—'})`;
                }

                if (selectedDeviceId && device.id == selectedDeviceId) {
                    option.selected = true;
                }
                selectElement.appendChild(option);
            });
        }

        // ============ ПОЛУЧЕНИЕ ПАРАМЕТРОВ КОМАНДЫ ============

        function getCommandParams(command, type) {
            if (!type || !type.param_names || !type.param_names.sending_commands) {
                return null;
            }

            const allCommands = [];
            const sendingCommands = type.param_names.sending_commands;

            // Ищем в binary
            if (sendingCommands.binary) {
                sendingCommands.binary.forEach(cmd => {
                    if (cmd.sending_name === command || cmd.system_name === command) {
                        allCommands.push(cmd);
                    }
                });
            }

            // Ищем в numeric
            if (sendingCommands.numeric) {
                sendingCommands.numeric.forEach(cmd => {
                    if (cmd.sending_name === command || cmd.system_name === command) {
                        allCommands.push(cmd);
                    }
                });
            }

            return allCommands.length > 0 ? allCommands[0] : null;
        }

        // ============ СОЗДАНИЕ ПОЛЕЙ ДЛЯ ПАРАМЕТРОВ КОМАНДЫ ============

        function createParamFields(container, params) {
            container.innerHTML = '';
            container.classList.remove('show');

            if (!params || !params.length) {
                return;
            }

            params.forEach(param => {
                const div = document.createElement('div');
                div.className = 'param-field show';

                const label = document.createElement('label');
                label.textContent = param.display_name || param.name || 'Значение';
                if (param.required) {
                    label.innerHTML += ' <span class="field-required">*</span>';
                }
                div.appendChild(label);

                let input;
                if (param.type === 'select' && param.options) {
                    input = document.createElement('select');
                    input.className = 'param-input';
                    input.dataset.paramName = param.name;

                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.textContent = `Выберите ${param.display_name || param.name}`;
                    input.appendChild(defaultOption);

                    param.options.forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt.value;
                        option.textContent = opt.label || opt.value;
                        input.appendChild(option);
                    });
                } else if (param.type === 'color') {
                    input = document.createElement('input');
                    input.type = 'color';
                    input.className = 'param-input';
                    input.dataset.paramName = param.name;
                    input.value = param.default || '#FFFFFF';
                } else if (param.type === 'number') {
                    input = document.createElement('input');
                    input.type = 'number';
                    input.className = 'param-input';
                    input.dataset.paramName = param.name;
                    input.placeholder = param.placeholder || '';
                    if (param.min !== undefined) input.min = param.min;
                    if (param.max !== undefined) input.max = param.max;
                    if (param.step !== undefined) input.step = param.step;
                } else {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'param-input';
                    input.dataset.paramName = param.name;
                    input.placeholder = param.placeholder || '';
                }

                div.appendChild(input);

                if (param.description) {
                    const hint = document.createElement('small');
                    hint.className = 'field-hint';
                    hint.textContent = param.description;
                    div.appendChild(hint);
                }

                container.appendChild(div);
                container.classList.add('show');
            });
        }

        // ============ ОБРАБОТЧИКИ СМЕНЫ КОНТРОЛЛЕРА ============

        async function onSrcControllerChange() {
            const srcControllerId = document.getElementById('srcController').value;
            const conditionBlocks = document.querySelectorAll('.condition-block');

            for (const block of conditionBlocks) {
                const deviceSelect = block.querySelector('.condition-device');
                await populateDeviceSelect(deviceSelect, srcControllerId);
            }
        }

        async function onDstControllerChange() {
            const dstControllerId = document.getElementById('dstController').value;
            const actionBlocks = document.querySelectorAll('.action-block');

            for (const block of actionBlocks) {
                const deviceSelect = block.querySelector('.action-device');
                await populateDeviceSelect(deviceSelect, dstControllerId);
            }
        }

        // ============ ДОБАВЛЕНИЕ УСЛОВИЯ ============

        async function addCondition(conditionData = null) {
            const container = document.getElementById('conditionsContainer');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = 'condition-block';
            div.dataset.index = index;

            div.innerHTML = `
                <div class="block-header">
                    <span>Условие ${index + 1}</span>
                    <button class="remove-btn" onclick="this.closest('.condition-block').remove()">Удалить</button>
                </div>
                <div class="form-group">
                    <label>Устройство (датчик)</label>
                    <select class="condition-device" data-index="${index}" onchange="onConditionDeviceChange(this)">
                        <option value="">Выберите устройство</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Действие (условие)</label>
                    <select class="condition-command" data-index="${index}" onchange="onConditionCommandChange(this)">
                        <option value="">Сначала выберите устройство</option>
                    </select>
                </div>
                <div class="value-field" id="condition-value-${index}">
                    <div class="form-group">
                        <label>Значение</label>
                        <input type="number" class="condition-value" placeholder="Введите число">
                    </div>
                </div>
            `;

            container.appendChild(div);

            const srcControllerId = document.getElementById('srcController').value;
            const deviceSelect = div.querySelector('.condition-device');
            await populateDeviceSelect(deviceSelect, srcControllerId);

            if (conditionData) {
                deviceSelect.value = conditionData.device_id;
                await onConditionDeviceChange(deviceSelect);

                const commandSelect = div.querySelector('.condition-command');
                commandSelect.value = conditionData.command;
                await onConditionCommandChange(commandSelect);

                if (conditionData.value) {
                    const valueInput = div.querySelector('.condition-value');
                    valueInput.value = conditionData.value;
                }
            }
        }

        // ============ ОБРАБОТЧИК ИЗМЕНЕНИЯ УСТРОЙСТВА В УСЛОВИИ ============

        async function onConditionDeviceChange(selectElement) {
            const block = selectElement.closest('.condition-block');
            const deviceId = selectElement.value;
            const commandSelect = block.querySelector('.condition-command');

            if (!deviceId) {
                commandSelect.innerHTML = '<option value="">Выберите устройство</option>';
                return;
            }

            const standardCommands = [
                { value: 'greater', label: '📈 Значение больше' },
                { value: 'less', label: '📉 Значение меньше' },
                { value: 'equal', label: '📊 Значение равно' },
                { value: 'changed', label: '🔄 Значение сменилось' },
                { value: 'timer', label: '⏱️ Таймер' }
            ];

            commandSelect.innerHTML = '<option value="">Выберите условие</option>';
            standardCommands.forEach(cmd => {
                const option = document.createElement('option');
                option.value = cmd.value;
                option.textContent = cmd.label;
                commandSelect.appendChild(option);
            });
        }

        // ============ ОБРАБОТЧИК ИЗМЕНЕНИЯ КОМАНДЫ В УСЛОВИИ ============

        function onConditionCommandChange(selectElement) {
            const block = selectElement.closest('.condition-block');
            const valueField = block.querySelector('.value-field');
            const command = selectElement.value;

            const commandsWithoutValue = ['changed'];
            const needsValue = command && !commandsWithoutValue.includes(command);

            if (needsValue) {
                valueField.classList.add('show');
            } else {
                valueField.classList.remove('show');
            }
        }

        // ============ ДОБАВЛЕНИЕ ДЕЙСТВИЯ ============

        async function addAction(actionData = null) {
            const container = document.getElementById('actionsContainer');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = 'action-block';
            div.dataset.index = index;

            div.innerHTML = `
                <div class="block-header">
                    <span>Действие ${index + 1}</span>
                    <button class="remove-btn" onclick="this.closest('.action-block').remove()">Удалить</button>
                </div>
                <div class="form-group">
                    <label>Устройство (исполнитель)</label>
                    <select class="action-device" data-index="${index}" onchange="onActionDeviceChange(this)">
                        <option value="">Выберите устройство</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Команда</label>
                    <select class="action-command" data-index="${index}" onchange="onActionCommandChange(this)">
                        <option value="">Сначала выберите устройство</option>
                    </select>
                </div>
                <div class="value-field" id="action-value-${index}">
                    <div class="form-group">
                        <label>Значение</label>
                        <input type="text" class="action-value" placeholder="Введите значение">
                    </div>
                </div>
                <div class="param-field" id="action-params-${index}"></div>
            `;

            container.appendChild(div);

            const dstControllerId = document.getElementById('dstController').value;
            const deviceSelect = div.querySelector('.action-device');
            await populateDeviceSelect(deviceSelect, dstControllerId);

            if (actionData) {
                deviceSelect.value = actionData.device_id;
                await onActionDeviceChange(deviceSelect);

                const commandSelect = div.querySelector('.action-command');
                commandSelect.value = actionData.command;
                await onActionCommandChange(commandSelect);

                if (actionData.value) {
                    const valueInput = div.querySelector('.action-value');
                    valueInput.value = actionData.value;
                }

                // Восстанавливаем параметры если есть
                if (actionData.params) {
                    const paramsContainer = div.querySelector(`#action-params-${index}`);
                    const params = Object.keys(actionData.params).map(key => ({
                        name: key,
                        display_name: key,
                        value: actionData.params[key]
                    }));
                    createParamFields(paramsContainer, params);
                }
            }
        }

        // ============ ОБРАБОТЧИК ИЗМЕНЕНИЯ УСТРОЙСТВА В ДЕЙСТВИИ ============

        async function onActionDeviceChange(selectElement) {
            const block = selectElement.closest('.action-block');
            const deviceId = selectElement.value;
            const commandSelect = block.querySelector('.action-command');
            const paramsContainer = block.querySelector('.param-field');

            // Очищаем параметры
            paramsContainer.innerHTML = '';
            paramsContainer.classList.remove('show');

            if (!deviceId) {
                commandSelect.innerHTML = '<option value="">Выберите устройство</option>';
                return;
            }

            const device = await findDeviceInCache(deviceId);
            if (!device) {
                commandSelect.innerHTML = '<option value="">Тип устройства не найден</option>';
                return;
            }

            // Для серверного устройства
            if (deviceId == -1) {
                commandSelect.innerHTML = `
                    <option value="">Выберите действие</option>
                    <option value="addOne">➕ Прибавить 1</option>
                    <option value="minusOne">➖ Вычесть 1</option>
                `;
                return;
            }

            const type = findTypeById(device.type_id);
            if (!type || !type.param_names || !type.param_names.sending_commands) {
                commandSelect.innerHTML = '<option value="">Команды не найдены</option>';
                return;
            }

            const sendingCommands = type.param_names.sending_commands;
            const allCommands = [];

            if (sendingCommands.binary && sendingCommands.binary.length > 0) {
                sendingCommands.binary.forEach(cmd => {
                    const displayName = cmd.display_name || cmd.sending_name || cmd.system_name;
                    allCommands.push({ value: cmd.sending_name || cmd.system_name, label: displayName, data: cmd });
                });
            }

            if (sendingCommands.numeric && sendingCommands.numeric.length > 0) {
                sendingCommands.numeric.forEach(cmd => {
                    const displayName = cmd.display_name || cmd.sending_name || cmd.system_name;
                    allCommands.push({ value: cmd.sending_name || cmd.system_name, label: displayName, data: cmd });
                });
            }

            commandSelect.innerHTML = '<option value="">Выберите команду</option>';
            allCommands.forEach(cmd => {
                const option = document.createElement('option');
                option.value = cmd.value;
                option.textContent = cmd.label;
                option.dataset.cmdData = JSON.stringify(cmd.data || {});
                commandSelect.appendChild(option);
            });
        }

        // ============ ОБРАБОТЧИК ИЗМЕНЕНИЯ КОМАНДЫ В ДЕЙСТВИИ ============

        function onActionCommandChange(selectElement) {
            const block = selectElement.closest('.action-block');
            const valueField = block.querySelector('.value-field');
            const paramsContainer = block.querySelector('.param-field');
            const command = selectElement.value;
            const deviceId = block.querySelector('.action-device').value;

            // Очищаем параметры
            paramsContainer.innerHTML = '';
            paramsContainer.classList.remove('show');

            if (!command) {
                valueField.classList.remove('show');
                return;
            }

            // Для серверных команд (addOne, minusOne)
            if (command === 'addOne' || command === 'minusOne') {
                valueField.classList.remove('show');
                return;
            }

            // Проверяем, есть ли параметры у команды
            const device = findDeviceInCache(deviceId).then(dev => {
                if (!dev) return;

                const type = findTypeById(dev.type_id);
                if (!type) return;

                const cmdInfo = getCommandParams(command, type);
                if (cmdInfo) {
                    // Проверяем, есть ли параметры
                    const hasParams = cmdInfo.params && cmdInfo.params.length > 0;

                    // Проверяем dataType
                    const dataType = cmdInfo.dataType;

                    if (dataType === 'boolT') {
                        // Булево значение - не показываем поле
                        valueField.classList.remove('show');
                        return;
                    }

                    if (hasParams) {
                        // Создаем поля для параметров
                        createParamFields(paramsContainer, cmdInfo.params);
                        valueField.classList.remove('show');
                    } else {
                        // Нет параметров - показываем стандартное поле значения
                        const commandsWithoutValue = ['toggle', 'turnOn', 'turnOff', 'startInf', 'stop'];
                        const needsValue = command && !commandsWithoutValue.includes(command);

                        if (needsValue) {
                            valueField.classList.add('show');
                        } else {
                            valueField.classList.remove('show');
                        }
                    }
                } else {
                    // Если команда не найдена - показываем стандартное поле
                    const commandsWithoutValue = ['toggle', 'turnOn', 'turnOff', 'startInf', 'stop'];
                    const needsValue = command && !commandsWithoutValue.includes(command);

                    if (needsValue) {
                        valueField.classList.add('show');
                    } else {
                        valueField.classList.remove('show');
                    }
                }
            });
        }

        // ============ ПОИСК УСТРОЙСТВА В КЕШЕ ============

        async function findDeviceInCache(deviceId) {
            for (const controllerId in devicesCache) {
                const device = devicesCache[controllerId].find(d => d.id == deviceId);
                if (device) return device;
            }
            return null;
        }

        // ============ ЗАГРУЗКА ТРИГГЕРОВ ============

        async function loadTriggers() {
            try {
                const response = await fetch('/api/triggers');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const triggers = await response.json();
                const tbody = document.getElementById('triggersTableBody');
                tbody.innerHTML = '';

                if (triggers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">📭 Нет созданных сценариев</td></tr>';
                    return;
                }

                triggers.forEach(trigger => {
                    const row = tbody.insertRow();
                    row.insertCell(0).innerText = trigger.id;
                    row.insertCell(1).innerText = trigger.name;

                    // Проверяем, является ли источник сервером
                    const isSrcServer = trigger.src_controller_name === 'Сервер' || trigger.src_controller_mac === 'serv';
                    const srcDisplay = isSrcServer ? `${trigger.src_controller_name} 🖥️` : trigger.src_controller_name;
                    row.insertCell(2).innerText = srcDisplay;

                    // Проверяем, является ли приемник сервером
                    const isDstServer = trigger.dst_controller_name === 'Сервер' || trigger.dst_controller_mac === 'serv';
                    const dstDisplay = isDstServer ? `${trigger.dst_controller_name} 🖥️` : trigger.dst_controller_name;
                    row.insertCell(3).innerText = dstDisplay;

                    const conditionsCell = row.insertCell(4);
                    if (trigger.conditions.length > 0) {
                        const subTable = document.createElement('table');
                        subTable.className = 'sub-table';
                        trigger.conditions.forEach(cond => {
                            const subRow = subTable.insertRow();
                            const typeDisplayName = getTypeDisplayName(cond.device_type_id);
                            const deviceLabel = `${cond.device_name} (${typeDisplayName})`;
                            subRow.insertCell(0).innerHTML = `
                                <strong>${deviceLabel}</strong><br>
                                <small>📊 ${cond.command}: ${cond.value || '—'}</small>
                            `;
                        });
                        conditionsCell.appendChild(subTable);
                    } else {
                        conditionsCell.innerText = '—';
                    }

                    const actionsCell = row.insertCell(5);
                    if (trigger.responses.length > 0) {
                        const subTable = document.createElement('table');
                        subTable.className = 'sub-table';
                        trigger.responses.forEach(resp => {
                            const subRow = subTable.insertRow();
                            const typeDisplayName = getTypeDisplayName(resp.device_type_id);
                            const deviceLabel = `${resp.device_name} (${typeDisplayName})`;
                            const isServerAction = resp.command === 'serv' || resp.controller_mac === 'serv';
                            const actionDisplay = isServerAction ? `🖥️ ${resp.command}` : `⚡ ${resp.command}`;
                            subRow.insertCell(0).innerHTML = `
                                <strong>${deviceLabel}</strong><br>
                                <small>${actionDisplay}: ${resp.value || '—'}</small>
                            `;
                        });
                        actionsCell.appendChild(subTable);
                    } else {
                        actionsCell.innerText = '—';
                    }

                    const actionCell = row.insertCell(6);
                    const editBtn = document.createElement('button');
                    editBtn.innerText = '✏️';
                    editBtn.className = 'edit-trigger-btn';
                    editBtn.title = 'Редактировать';
                    editBtn.onclick = () => editTrigger(trigger);
                    actionCell.appendChild(editBtn);

                    const delBtn = document.createElement('button');
                    delBtn.innerText = '🗑️';
                    delBtn.className = 'delete-trigger-btn';
                    delBtn.title = 'Удалить';
                    delBtn.onclick = () => deleteTrigger(trigger.id);
                    actionCell.appendChild(delBtn);
                });
            } catch (error) {
                console.error('Error loading triggers:', error);
                if (window.notificationManager) {
                    window.notificationManager.showToast({
                        type: 'error',
                        message: '❌ Ошибка загрузки сценариев'
                    });
                } else {
                    showToast('❌ Ошибка загрузки сценариев');
                }
            }
        }

        // ============ СОЗДАНИЕ И РЕДАКТИРОВАНИЕ ============

        async function showCreateModal() {
            currentEditId = null;
            document.getElementById('modalTitle').innerText = '➕ Создать сценарий';
            document.getElementById('triggerName').value = '';
            document.getElementById('srcController').value = '';
            document.getElementById('dstController').value = '';
            document.getElementById('conditionsContainer').innerHTML = '';
            document.getElementById('actionsContainer').innerHTML = '';

            await loadDeviceTypes();
            await loadControllers();

            document.getElementById('srcController').onchange = onSrcControllerChange;
            document.getElementById('dstController').onchange = onDstControllerChange;

            await addCondition();
            await addAction();

            document.getElementById('triggerModal').classList.add('active');
        }

        async function editTrigger(trigger) {
            currentEditId = trigger.id;
            document.getElementById('modalTitle').innerText = '✏️ Редактировать сценарий';
            document.getElementById('triggerName').value = trigger.name;

            await loadDeviceTypes();
            await loadControllers();

            document.getElementById('srcController').onchange = onSrcControllerChange;
            document.getElementById('dstController').onchange = onDstControllerChange;

            // Устанавливаем контроллеры
            const srcController = controllersList.find(c => c.name === trigger.src_controller_name);
            const dstController = controllersList.find(c => c.name === trigger.dst_controller_name) ||
                (trigger.dst_controller_name === 'Сервер' ? { id: SERVER_ID } : null);

            if (srcController) {
                document.getElementById('srcController').value = srcController.id;
            }
            if (dstController) {
                document.getElementById('dstController').value = dstController.id;
            }

            await onSrcControllerChange();
            await onDstControllerChange();

            document.getElementById('conditionsContainer').innerHTML = '';
            for (const cond of trigger.conditions) {
                await addCondition(cond);
            }

            document.getElementById('actionsContainer').innerHTML = '';
            for (const resp of trigger.responses) {
                await addAction(resp);
            }

            document.getElementById('triggerModal').classList.add('active');
        }

        // ============ СОХРАНЕНИЕ ТРИГГЕРА ============

        async function saveTrigger() {
            const name = document.getElementById('triggerName').value;
            const srcControllerId = document.getElementById('srcController').value;
            const dstControllerId = document.getElementById('dstController').value;

            if (!name || !srcControllerId || !dstControllerId) {
                if (window.notificationManager) {
                    window.notificationManager.showToast({
                        type: 'warning',
                        message: '❌ Заполните все обязательные поля'
                    });
                } else {
                    showToast('❌ Заполните все обязательные поля');
                }
                return;
            }

            const conditions = [];
            document.querySelectorAll('.condition-block').forEach(block => {
                const deviceId = block.querySelector('.condition-device').value;
                const command = block.querySelector('.condition-command').value;
                const valueInput = block.querySelector('.condition-value');
                const value = valueInput ? valueInput.value : '';

                if (deviceId && command) {
                    conditions.push({
                        device_id: parseInt(deviceId),
                        command: command,
                        value: value
                    });
                }
            });

            const responses = [];
            document.querySelectorAll('.action-block').forEach(block => {
                const deviceId = block.querySelector('.action-device').value;
                const command = block.querySelector('.action-command').value;
                const valueInput = block.querySelector('.action-value');
                const value = valueInput ? valueInput.value : '';

                // Собираем параметры
                const paramsContainer = block.querySelector('.param-field');
                const params = {};
                if (paramsContainer) {
                    const inputs = paramsContainer.querySelectorAll('.param-input');
                    inputs.forEach(input => {
                        const name = input.dataset.paramName || 'value';
                        params[name] = input.value || '';
                    });
                }

                const paramsStr = Object.keys(params).length > 0 ? JSON.stringify(params) : '';

                // Если выбран Сервер - используем serv вместо MAC
                const isServer = parseInt(dstControllerId) === SERVER_ID;
                let finalCommand = command;

                if (isServer && command && command !== 'addOne' && command !== 'minusOne') {
                    // Для сервера команда должна быть 'serv'
                    finalCommand = 'serv';
                }

                if (deviceId && command) {
                    responses.push({
                        device_id: parseInt(deviceId),
                        command: finalCommand,
                        value: value || paramsStr
                    });
                }
            });

            if (conditions.length === 0) {
                if (window.notificationManager) {
                    window.notificationManager.showToast({
                        type: 'warning',
                        message: '❌ Добавьте хотя бы одно условие'
                    });
                } else {
                    showToast('❌ Добавьте хотя бы одно условие');
                }
                return;
            }

            if (responses.length === 0) {
                if (window.notificationManager) {
                    window.notificationManager.showToast({
                        type: 'warning',
                        message: '❌ Добавьте хотя бы одно действие'
                    });
                } else {
                    showToast('❌ Добавьте хотя бы одно действие');
                }
                return;
            }

            const data = {
                name: name,
                src_controller_id: parseInt(srcControllerId),
                dst_controller_id: parseInt(dstControllerId),
                conditions: conditions,
                responses: responses
            };

            const url = currentEditId ? `/api/triggers/${currentEditId}` : '/api/triggers';
            const method = currentEditId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    if (window.notificationManager) {
                        window.notificationManager.showToast({
                            type: 'ok',
                            message: currentEditId ? '✅ Сценарий обновлен' : '✅ Сценарий создан'
                        });
                    } else {
                        showToast(currentEditId ? '✅ Сценарий обновлен' : '✅ Сценарий создан');
                    }
                    closeModal();
                    loadTriggers();
                    devicesCache = {};
                } else {
                    const error = await response.json();
                    if (window.notificationManager) {
                        window.notificationManager.showToast({
                            type: 'error',
                            message: `❌ Ошибка: ${error.error || 'Неизвестная ошибка'}`
                        });
                    } else {
                        showToast(`❌ Ошибка: ${error.error || 'Неизвестная ошибка'}`);
                    }
                }
            } catch (error) {
                console.error('Error saving trigger:', error);
                if (window.notificationManager) {
                    window.notificationManager.showToast({
                        type: 'error',
                        message: '❌ Ошибка сохранения сценария'
                    });
                } else {
                    showToast('❌ Ошибка сохранения сценария');
                }
            }
        }

        // ============ УДАЛЕНИЕ ТРИГГЕРА ============

        async function deleteTrigger(triggerId) {
            if (!confirm('Удалить сценарий? Это действие нельзя отменить.')) return;

            try {
                const response = await fetch(`/api/triggers/${triggerId}`, { method: 'DELETE' });
                if (response.ok) {
                    if (window.notificationManager) {
                        window.notificationManager.showToast({
                            type: 'ok',
                            message: '✅ Сценарий удален'
                        });
                    } else {
                        showToast('✅ Сценарий удален');
                    }
                    loadTriggers();
                } else {
                    if (window.notificationManager) {
                        window.notificationManager.showToast({
                            type: 'error',
                            message: '❌ Ошибка удаления'
                        });
                    } else {
                        showToast('❌ Ошибка удаления');
                    }
                }
            } catch (error) {
                console.error('Error deleting trigger:', error);
                if (window.notificationManager) {
                    window.notificationManager.showToast({
                        type: 'error',
                        message: '❌ Ошибка удаления сценария'
                    });
                } else {
                    showToast('❌ Ошибка удаления сценария');
                }
            }
        }

        // ============ ВСПОМОГАТЕЛЬНЫЕ ============

        function closeModal() {
            document.getElementById('triggerModal').classList.remove('active');
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============ ПОДПИСКА НА УВЕДОМЛЕНИЯ ============

        document.addEventListener('DOMContentLoaded', function() {
            if (window.notificationManager) {
                window.notificationManager.addListener('notification', function(data) {
                    console.log('[Triggers] Уведомление:', data);
                    if (data.type === 'INIT_ERROR' || data.type === 'INIT_SUCCESS' ||
                        data.type === 'DEVICE_OFFLINE' || data.type === 'DEVICE_ONLINE' ||
                        data.type === 'TRIGGER_CREATED' || data.type === 'TRIGGER_DELETED') {
                        loadTriggers();
                    }
                });

                window.notificationManager.addListener('device_status_update', function(data) {
                    console.log('[Triggers] Обновление статуса устройства:', data);
                    loadTriggers();
                });

                window.notificationManager.addListener('connection_status', function(status) {
                    const dot = document.getElementById('statusDot');
                    const text = document.getElementById('statusText');
                    if (dot && text) {
                        dot.className = `status-dot ${status}`;
                        const statusMap = {
                            'online': 'Подключено',
                            'offline': 'Отключено',
                            'error': 'Ошибка'
                        };
                        text.textContent = statusMap[status] || 'Неизвестно';
                    }
                });
            }
        });

        // ============ ИНИЦИАЛИЗАЦИЯ ============

        loadDeviceTypes();
        loadTriggers();
    </script>
</body>
</html>
