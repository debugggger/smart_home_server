<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Управление комнатами - Умный дом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fb;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #1e2a3a;
            font-size: 28px;
        }

        .back-btn {
            background: #64748b;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #475569;
        }

        .add-btn {
            background: #4fc3f7;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: #1e2a3a;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .add-btn:hover {
            background: #29b6f6;
            transform: translateY(-2px);
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 24px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid #edf2f7;
        }

        .delete-btn {
            background: #fee2e2;
            border: none;
            color: #b91c1c;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
        }

        .delete-btn:hover {
            background: #fecaca;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .modal-buttons button:first-child {
            background: #4fc3f7;
            color: white;
        }

        .toast-msg {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1e2a3a;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: 0.2s;
        }

        .toast-msg.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Управление комнатами</h1>
            <div>
                <button class="back-btn" onclick="goBack()">← На главную</button>
                <button class="add-btn" onclick="showAddRoomModal()">+ Добавить комнату</button>
            </div>
        </div>

        <div class="card">
            <table id="roomsTable">
                <thead>
                    <tr><th>ID</th><th>Название</th><th>Действие</th></tr>
                </thead>
                <tbody id="roomsTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="addRoomModal" class="modal">
        <div class="modal-content">
            <h3>➕ Добавить комнату</h3>
            <div class="form-group">
                <label>Название комнаты</label>
                <input type="text" id="roomName" placeholder="Например: Гостиная">
            </div>
            <div class="modal-buttons">
                <button onclick="saveRoom()">Сохранить</button>
                <button onclick="closeModal('addRoomModal')">Отмена</button>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>

    <script>
        async function loadRooms() {
            const response = await fetch('/api/rooms');
            const rooms = await response.json();
            const tbody = document.getElementById('roomsTableBody');
            tbody.innerHTML = '';
            rooms.forEach(room => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = room.id;
                row.insertCell(1).innerText = room.name;
                const actionCell = row.insertCell(2);
                const delBtn = document.createElement('button');
                delBtn.innerText = 'Удалить';
                delBtn.className = 'delete-btn';
                delBtn.onclick = () => deleteRoom(room.id);
                actionCell.appendChild(delBtn);
            });
        }

        function showAddRoomModal() {
            document.getElementById('addRoomModal').classList.add('active');
        }

        async function saveRoom() {
            const name = document.getElementById('roomName').value;
            if (!name) {
                alert('Введите название комнаты');
                return;
            }
            const response = await fetch('/api/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            if (response.ok) {
                closeModal('addRoomModal');
                showToast('✅ Комната добавлена');
                loadRooms();
                document.getElementById('roomName').value = '';
            } else {
                showToast('❌ Ошибка добавления');
            }
        }

        async function deleteRoom(roomId) {
            if (!confirm('Удалить комнату?')) return;
            await fetch(`/api/rooms/${roomId}`, { method: 'DELETE' });
            showToast('✅ Комната удалена');
            loadRooms();
        }

        function goBack() {
            window.location.href = '/';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        loadRooms();
    </script>
</body>
</html>
