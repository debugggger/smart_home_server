version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mqtt_broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - smart_home_network
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep 1883 | grep LISTEN || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

